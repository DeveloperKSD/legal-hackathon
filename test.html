<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LexAI Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f172a; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
  #header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid #1e293b; }
  #header-left { display: flex; align-items: center; gap: 10px; }
  #logo { width: 36px; height: 36px; border-radius: 8px; background: #1e3a5f; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  #title { font-weight: 700; font-size: 16px; color: #f1f5f9; }
  #subtitle { font-size: 11px; color: #64748b; }
  #pdf-badge { font-size: 11px; background: #1e3a5f; color: #60a5fa; padding: 3px 8px; border-radius: 20px; }
  #clear-btn { background: transparent; border: none; color: #64748b; cursor: pointer; padding: 6px; font-size: 16px; }
  #messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg-row { display: flex; gap: 8px; align-items: flex-end; }
  .msg-row.user { justify-content: flex-end; }
  .avatar { font-size: 20px; flex-shrink: 0; }
  .bubble { max-width: 78%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
  .bubble.user { background: #1d4ed8; color: #f1f5f9; border-bottom-right-radius: 4px; }
  .bubble.ai { background: #1e293b; color: #e2e8f0; border-bottom-left-radius: 4px; border: 1px solid #334155; }
  .ctx-tag { margin-top: 6px; font-size: 11px; color: #60a5fa; }
  #empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 20px; gap: 8px; }
  #empty-icon { font-size: 48px; margin-bottom: 8px; }
  #empty-title { font-size: 20px; font-weight: 600; color: #f1f5f9; }
  #empty-sub { font-size: 13px; color: #64748b; margin-bottom: 20px; }
  #suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .suggestion { background: #1e293b; border: 1px solid #334155; color: #94a3b8; border-radius: 20px; padding: 6px 14px; font-size: 13px; cursor: pointer; }
  .suggestion:hover { border-color: #60a5fa; color: #60a5fa; }
  #disclaimer { font-size: 11px; color: #475569; text-align: center; padding: 6px 16px; border-top: 1px solid #1e293b; }
  #input-row { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #1e293b; }
  #input { flex: 1; background: #1e293b; border: 1px solid #334155; border-radius: 10px; color: #e2e8f0; padding: 10px 14px; font-size: 14px; resize: none; font-family: inherit; outline: none; }
  #send-btn { background: #1d4ed8; border: none; border-radius: 10px; color: #fff; width: 42px; cursor: pointer; font-size: 18px; }
  #send-btn:disabled { opacity: 0.4; cursor: default; }
  #error { background: #450a0a; border: 1px solid #7f1d1d; color: #fca5a5; padding: 8px 14px; border-radius: 8px; font-size: 13px; text-align: center; margin: 0 16px; }
  .typing { display: flex; gap: 4px; padding: 2px 0; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #94a3b8; animation: bounce 1s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
</style>
</head>
<body>

<div id="header">
  <div id="header-left">
    <div id="logo">⚖️</div>
    <div>
      <div id="title">LexAI</div>
      <div id="subtitle">Indian Legal Assistant</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div id="pdf-badge">Loading PDFs...</div>
    <button id="clear-btn" title="Clear chat">🗑️</button>
  </div>
</div>

<div id="messages">
  <div id="empty">
    <div id="empty-icon">⚖️</div>
    <div id="empty-title">Ask me about Indian law</div>
    <div id="empty-sub">IPC · Constitution · CrPC · Consumer Rights · RTI and more</div>
    <div id="suggestions">
      <button class="suggestion" onclick="send('What is Section 302 IPC?')">What is Section 302 IPC?</button>
      <button class="suggestion" onclick="send('What are my rights if arrested?')">What are my rights if arrested?</button>
      <button class="suggestion" onclick="send('How do I file an FIR?')">How do I file an FIR?</button>
      <button class="suggestion" onclick="send('Explain Article 21 of the Constitution')">Explain Article 21 of the Constitution</button>
    </div>
  </div>
</div>

<div id="error" style="display:none"></div>
<div id="disclaimer">LexAI provides legal information, not legal advice. Consult a qualified advocate for your specific situation.</div>
<div id="input-row">
  <textarea id="input" rows="1" placeholder="Ask about Indian law… (Enter to send, Shift+Enter for newline)"></textarea>
  <button id="send-btn" onclick="send()" disabled>➤</button>
</div>

<script>
const BACKEND = "http://localhost:8000";
let history = JSON.parse(sessionStorage.getItem("lexai_history") || "[]");
let loading = false;

// load PDFs info
fetch(`${BACKEND}/pdfs`)
  .then(r => r.json())
  .then(d => {
    document.getElementById("pdf-badge").textContent = `📄 ${d.count} PDF${d.count !== 1 ? "s" : ""}`;
  })
  .catch(() => {
    document.getElementById("pdf-badge").textContent = "⚠️ Backend offline";
    document.getElementById("pdf-badge").style.background = "#450a0a";
    document.getElementById("pdf-badge").style.color = "#fca5a5";
  });

// restore history
if (history.length > 0) {
  document.getElementById("empty").style.display = "none";
  history.forEach(m => appendBubble(m.role, m.content, m.contextUsed));
}

// input handlers
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("send-btn");

inputEl.addEventListener("input", () => {
  sendBtn.disabled = !inputEl.value.trim() || loading;
});
inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

document.getElementById("clear-btn").addEventListener("click", () => {
  history = [];
  sessionStorage.removeItem("lexai_history");
  document.getElementById("messages").innerHTML = '';
  document.getElementById("messages").appendChild(document.getElementById("empty") || createEmpty());
  location.reload();
});

function appendBubble(role, content, contextUsed = false) {
  const empty = document.getElementById("empty");
  if (empty) empty.style.display = "none";

  const row = document.createElement("div");
  row.className = `msg-row ${role === "user" ? "user" : ""}`;

  if (role === "assistant") {
    const av = document.createElement("div");
    av.className = "avatar"; av.textContent = "⚖️";
    row.appendChild(av);
  }

  const bubble = document.createElement("div");
  bubble.className = `bubble ${role === "user" ? "user" : "ai"}`;
  bubble.textContent = content;

  if (contextUsed) {
    const tag = document.createElement("div");
    tag.className = "ctx-tag"; tag.textContent = "📄 used PDF context";
    bubble.appendChild(tag);
  }

  row.appendChild(bubble);
  document.getElementById("messages").appendChild(row);
  row.scrollIntoView({ behavior: "smooth" });
  return bubble;
}

function showTyping() {
  const row = document.createElement("div");
  row.className = "msg-row"; row.id = "typing-row";
  const av = document.createElement("div");
  av.className = "avatar"; av.textContent = "⚖️";
  const bubble = document.createElement("div");
  bubble.className = "bubble ai";
  bubble.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  row.appendChild(av); row.appendChild(bubble);
  document.getElementById("messages").appendChild(row);
  row.scrollIntoView({ behavior: "smooth" });
}

function hideTyping() {
  const r = document.getElementById("typing-row");
  if (r) r.remove();
}

function showError(msg) {
  const el = document.getElementById("error");
  el.textContent = `⚠️ ${msg} — is the backend running on port 8000?`;
  el.style.display = "block";
  setTimeout(() => el.style.display = "none", 5000);
}

async function send(text) {
  const userText = text || inputEl.value.trim();
  if (!userText || loading) return;
  inputEl.value = "";
  sendBtn.disabled = true;
  loading = true;

  const newHistory = [...history, { role: "user", content: userText }];
  appendBubble("user", userText);
  showTyping();

  try {
    const res = await fetch(`${BACKEND}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: newHistory.map(m => ({ role: m.role, content: m.content })) })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    hideTyping();
    appendBubble("assistant", data.reply, data.context_used);
    history = [...newHistory, { role: "assistant", content: data.reply, contextUsed: data.context_used }];
    sessionStorage.setItem("lexai_history", JSON.stringify(history));
  } catch (err) {
    hideTyping();
    showError(err.message);
  } finally {
    loading = false;
    sendBtn.disabled = !inputEl.value.trim();
  }
}
</script>
</body>
</html>
